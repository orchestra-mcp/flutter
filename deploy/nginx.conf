# Orchestra Flutter Web — nginx configuration for Docker
#
# SPA routing: all paths fall back to index.html.
# Aggressive caching for content-hashed Flutter assets.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    # Cache Flutter assets aggressively (content-hashed filenames)
    location /flutter_assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache CanvasKit and asset bundles
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS and WASM bundles
    location ~* \.(js|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:;" always;
}
