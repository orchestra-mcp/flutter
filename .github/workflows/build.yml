name: Build

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: android,ios,macos,linux,windows,web)'
        required: false
        default: 'android,ios,macos,linux,windows,web'
      build_number:
        description: 'Build number override (default: github.run_number)'
        required: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}

jobs:
  # ── Android ─────────────────────────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    if: contains(github.event.inputs.platforms || 'android', 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        if: env.ANDROID_KEY_ALIAS != ''
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Build APK
        run: flutter build apk --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Build AAB
        run: flutter build appbundle --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios:
    name: iOS (IPA)
    if: contains(github.event.inputs.platforms || 'ios', 'ios')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Install Apple certificate and profile
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (no codesign for CI)
        run: flutter build ios --release --no-codesign --build-number=${{ env.BUILD_NUMBER }}

      - name: Build IPA (if signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: flutter build ipa --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Upload IPA
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ── macOS ───────────────────────────────────────────────────────────────────
  macos:
    name: macOS (DMG)
    if: contains(github.event.inputs.platforms || 'macos', 'macos')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd macos && pod install

      - name: Build macOS
        run: flutter build macos --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Orchestra.app"
          DMG_PATH="build/macos/Orchestra-${{ env.BUILD_NUMBER }}.dmg"
          hdiutil create -volname "Orchestra" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/Orchestra-*.dmg
          retention-days: 30

  # ── Linux ───────────────────────────────────────────────────────────────────
  linux:
    name: Linux (Bundle)
    if: contains(github.event.inputs.platforms || 'linux', 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/build/orchestra-linux-x64.tar.gz .

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/orchestra-linux-x64.tar.gz
          retention-days: 30

  # ── Windows ─────────────────────────────────────────────────────────────────
  windows:
    name: Windows (MSIX)
    if: contains(github.event.inputs.platforms || 'windows', 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --build-number=${{ env.BUILD_NUMBER }}

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "build\orchestra-windows-x64.zip"

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: build/orchestra-windows-x64.zip
          retention-days: 30

  # ── Web ─────────────────────────────────────────────────────────────────────
  web:
    name: Web
    if: contains(github.event.inputs.platforms || 'web', 'web')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit --base-href /

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 30

  # ── Docker (Web) ────────────────────────────────────────────────────────────
  docker-web:
    name: Docker (Web)
    if: contains(github.event.inputs.platforms || 'web', 'web')
    runs-on: ubuntu-latest
    needs: web
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/orchestra-web:latest
            ghcr.io/${{ github.repository_owner }}/orchestra-web:${{ env.BUILD_NUMBER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
