name: Release

on:
  push:
    tags: ['app-v*']

permissions:
  contents: write
  packages: write

jobs:
  # ── Version extraction ──────────────────────────────────────────────────────
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/app-v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

  # ── Android ─────────────────────────────────────────────────────────────────
  android:
    name: Android Release
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Upload to Play Store (internal track)
        if: env.PLAY_STORE_SERVICE_ACCOUNT != ''
        env:
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.orchestramcp.orchestra
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

      - name: Upload AAB to release
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios:
    name: iOS Release
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Install Apple certificate and profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Upload to TestFlight
        if: env.APP_STORE_CONNECT_API_KEY != ''
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_API_ISSUER_ID }}"

      - name: Upload IPA to release
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ── macOS ───────────────────────────────────────────────────────────────────
  macos:
    name: macOS Release
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd macos && pod install

      - name: Build macOS
        run: |
          flutter build macos --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Code sign (if certificate available)
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/mac-signing.keychain-db
          security create-keychain -p "ci" $KEYCHAIN_PATH
          security unlock-keychain -p "ci" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/mac_certificate.p12
          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "build/macos/Build/Products/Release/Orchestra.app"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Orchestra.app"
          DMG_NAME="Orchestra-${{ needs.version.outputs.version }}-macos.dmg"
          hdiutil create -volname "Orchestra" -srcfolder "$APP_PATH" -ov -format UDZO "build/macos/$DMG_NAME"

      - name: Notarize (if credentials available)
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls build/macos/Orchestra-*.dmg)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-dmg
          path: build/macos/Orchestra-*.dmg

  # ── Linux ───────────────────────────────────────────────────────────────────
  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          flutter build linux --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/build/orchestra-${{ needs.version.outputs.version }}-linux-x64.tar.gz .

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-tarball
          path: build/orchestra-*-linux-x64.tar.gz

  # ── Windows ─────────────────────────────────────────────────────────────────
  windows:
    name: Windows Release
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release `
            --build-name=${{ needs.version.outputs.version }} `
            --build-number=${{ needs.version.outputs.build_number }}

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "build\orchestra-${{ needs.version.outputs.version }}-windows-x64.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: build/orchestra-*-windows-x64.zip

  # ── Web + Docker ────────────────────────────────────────────────────────────
  web:
    name: Web Release
    runs-on: ubuntu-latest
    needs: version
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit --base-href /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/orchestra-web:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/orchestra-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, android, ios, macos, linux, windows, web]
    if: always() && needs.version.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Orchestra App v${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            artifacts/android-release-aab/*
            artifacts/ios-release-ipa/*
            artifacts/macos-release-dmg/*
            artifacts/linux-release-tarball/*
            artifacts/windows-release-zip/*
