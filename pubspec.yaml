name: orchestra
description: "Orchestra AI — cross-platform agent client"
publish_to: 'none'
version: 1.0.6+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Database (Drift ORM)
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3: ^2.7.0
  crypto: ^3.0.6

  # Networking
  dio: ^5.9.2
  http: ^1.6.0
  web_socket_channel: ^3.0.3
  connectivity_plus: ^7.0.0

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  equatable: ^2.0.8

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5

  # Firebase
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  firebase_performance: ^0.11.1

  # Health
  health: ^13.3.1

  # Images & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  pasteboard: ^0.3.0
  flutter_svg: ^2.2.4
  lottie: ^3.3.2

  # UI components
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_animate: ^4.5.2
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Permissions & Platform
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  file_picker: ^10.3.10

  # Deep links
  app_links: ^6.4.0

  # Auth
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0
  local_auth: ^3.0.1

  # i18n
  intl: ^0.20.2

  # Web interop (Flutter 3.22+)
  web: ^1.1.1

  # Flavors / multi-env
  flutter_flavor: ^3.1.4
  adaptive_platform_ui: ^0.1.103
  cupertino_native: ^0.1.1

  # Desktop tray
  tray_manager: ^0.5.2

  # Terminal emulator
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  dartssh2: ^2.9.3
  pdf: ^3.12.0
  powersync: ^1.18.0
  uuid: ^4.5.3
  qr_flutter: ^4.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/tray/

  fonts:
    - family: "MesloLGS NF"
      fonts:
        - asset: assets/fonts/MesloLGS-NF-Regular.ttf
        - asset: assets/fonts/MesloLGS-NF-Bold.ttf
          weight: 700
        - asset: assets/fonts/MesloLGS-NF-Italic.ttf
          style: italic
        - asset: assets/fonts/MesloLGS-NF-BoldItalic.ttf
          weight: 700
          style: italic
    - family: "IBM Plex Sans"
      fonts:
        - asset: assets/fonts/IBMPlexSans-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: "IBM Plex Sans Arabic"
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: "IBM Plex Mono"
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
